name: Repo Shakedown

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours — cycles through pit-boss recommendations
  workflow_dispatch:
    inputs:
      pitboss_s3_prefix:
        description: 'S3 prefix for pit-boss data (leave blank for auto-detect)'
        required: false
        default: ''
      enable_jira:
        description: 'Create Jira tickets'
        required: false
        type: boolean
        default: true
      enable_slack:
        description: 'Send Slack notifications'
        required: false
        type: boolean
        default: true

jobs:
  shakedown:
    uses: BeyondMachines/repo-shakedown/.github/workflows/repo-shakedown.yml@c6eef9ced6585ca54af83f7902bf9b3933d3bc42  # v1
    with:
      s3_bucket: "pr-bouncer-code-reviews"
      shakedown_threshold: 5
      pitboss_s3_prefix: ${{ inputs.pitboss_s3_prefix || '' }}
      enable_jira: ${{ fromJSON(inputs.enable_jira || 'true') }}
      enable_slack: ${{ fromJSON(inputs.enable_slack || 'true') }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.PR_BOUNCER_GEMINI_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.PR_BOUNCER_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.PR_BOUNCER_AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.PR_BOUNCER_VATBOX_AWS_REGION }}
      SLACK_WEBHOOK_URL: ${{ secrets.PR_BOUNCER_SLACK_WEBHOOK_URL }}
      JIRA_BASE_URL: ${{ secrets.PR_BOUNCER_JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.PR_BOUNCER_JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.PR_BOUNCER_JIRA_API_TOKEN }}
