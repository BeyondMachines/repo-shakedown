name: Repo Shakedown

# Reusable workflow — call from your org's repo:
#   jobs:
#     shakedown:
#       uses: BeyondMachines/repo-shakedown/.github/workflows/repo-shakedown.yml@v1
#       with:
#         s3_bucket: "your-bucket-name"
#         enable_jira: true
#         enable_slack: true
#       secrets:
#         GEMINI_API_KEY: ${{ secrets.YOUR_GEMINI_KEY }}
#         AWS_ACCESS_KEY_ID: ${{ secrets.YOUR_AWS_KEY_ID }}
#         AWS_SECRET_ACCESS_KEY: ${{ secrets.YOUR_AWS_SECRET }}

on:
  workflow_call:
    inputs:
      pitboss_s3_prefix:
        description: 'S3 prefix for pit-boss data (auto-detects pitboss-snapshots/YYYY-MM/ if blank)'
        required: false
        type: string
        default: ''
      llm:
        description: 'LLM model (e.g. gemini/gemini-2.5-pro, anthropic/claude-sonnet-4-6)'
        required: false
        type: string
        default: 'gemini/gemini-2.5-pro'
      s3_reports_prefix:
        description: 'S3 prefix for uploaded reports and scanned_repos.json'
        required: false
        type: string
        default: 'shakedown-reports/'
      enable_slack:
        description: 'Send Slack notification on scan completion'
        required: false
        type: boolean
        default: false
      enable_jira:
        description: 'Create a Jira ticket for each scan'
        required: false
        type: boolean
        default: false
      jira_project_key:
        description: 'Jira project key for new tickets'
        required: false
        type: string
        default: 'SEC'
      reprocess:
        description: 'Re-ingest pit-boss snapshots even if already processed'
        required: false
        type: boolean
        default: false
      s3_bucket:
        description: 'S3 bucket for pit-boss snapshots, reports, and scan tracking'
        required: true
        type: string
      scripts_ref:
        description: 'Git ref to use when checking out repo-shakedown scripts (default: v1)'
        required: false
        type: string
        default: 'v1'
    secrets:
      GEMINI_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      LLM_API_KEY:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_REGION:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      JIRA_BASE_URL:
        required: false
      JIRA_EMAIL:
        required: false
      JIRA_API_TOKEN:
        required: false
      REPO_CLONE_PAT:
        required: false

jobs:
  shakedown:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repo-shakedown scripts
        uses: actions/checkout@v4
        with:
          repository: BeyondMachines/repo-shakedown
          path: .repo-shakedown
          ref: ${{ inputs.scripts_ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r .repo-shakedown/requirements.txt

      - name: Install Strix
        run: |
          curl -sSL https://strix.ai/install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Pull Strix sandbox image
        run: docker pull ghcr.io/usestrix/strix-sandbox:latest

      - name: Configure git credentials for private repos
        env:
          CLONE_TOKEN: ${{ secrets.REPO_CLONE_PAT || github.token }}
        run: |
          git config --global \
            url."https://x-access-token:${CLONE_TOKEN}@github.com/".insteadOf \
            "https://github.com/"

      - name: Run Shakedown — scan one repo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          S3_BUCKET: ${{ inputs.s3_bucket }}
          S3_REPORTS_PREFIX: ${{ inputs.s3_reports_prefix }}
          SLACK_WEBHOOK_URL: ${{ inputs.enable_slack && secrets.SLACK_WEBHOOK_URL || '' }}
          JIRA_BASE_URL: ${{ inputs.enable_jira && secrets.JIRA_BASE_URL || '' }}
          JIRA_PROJECT_KEY: ${{ inputs.jira_project_key }}
          JIRA_EMAIL: ${{ inputs.enable_jira && secrets.JIRA_EMAIL || '' }}
          JIRA_API_TOKEN: ${{ inputs.enable_jira && secrets.JIRA_API_TOKEN || '' }}
        run: |
          if [ -n "${{ inputs.pitboss_s3_prefix }}" ]; then
            SOURCE="--s3-prefix ${{ inputs.pitboss_s3_prefix }}"
          else
            YEAR=$(date +%Y)
            MONTH=$(date +%m)
            SOURCE="--s3-prefix pitboss-snapshots/${YEAR}-${MONTH}/"
          fi

          REPROCESS_FLAG=""
          [ "${{ inputs.reprocess }}" = "true" ] && REPROCESS_FLAG="--reprocess"

          python .repo-shakedown/repo_shakedown.py \
            --llm "${{ inputs.llm }}" \
            run-one \
            $SOURCE \
            --repos-dir "./repos" \
            --auto-clone \
            $REPROCESS_FLAG

      - name: Upload scan results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shakedown-results-${{ github.run_id }}
          path: |
            ./shakedown-work/reports/
            ./shakedown-work/results/
            ./shakedown-work/tasks.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Cleanup repo-shakedown checkout
        if: always()
        run: rm -rf .repo-shakedown
